name: Backend CI

on:
    push:
        paths:
            - 'backend/**'
    pull_request:
        paths:
            - 'backend/**'
jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build Backend Image
              uses: docker/build-push-action@v7
              with:
                context: ./backend
                load: true
                tags: backend-app:test
            
            - name: Run Container
              run: |
               docker run -d --name backend-test -p 8080:80 frontend-app:test
               sleep 5
            - name: Verify Backend
              run: |
                RESPONSE=$(curl -s http://localhost:8080)
                echo "Response: $RESPONSE"
                if [[ "$RESPONSE" == *"Hello from the backend!"* ]]; then
                  echo "Backend verification successful!"
                else
                  echo "Backend verification failed!"
                  exit 1
                fi
            - name: Shutdown Container
              if: always()
              run: docker rm -f backend-test